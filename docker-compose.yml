version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: medtravel
      POSTGRES_USER: migration_owner
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - medtravel_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  medtravel_pg_data:
